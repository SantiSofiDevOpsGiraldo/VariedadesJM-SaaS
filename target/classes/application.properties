spring.datasource.url=jdbc:mysql://localhost:3306/caja_clara?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota
spring.datasource.username=root
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.type.preferred_enum_type=VARCHAR

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

jwt.secret=cajaClaraSuperSecretKey2024ForJWTTokenGenerationAndValidation
jwt.expiration=86400000

server.port=8080
